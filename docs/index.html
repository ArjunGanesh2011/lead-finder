<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lead Finder — Arjun Ganesh</title>
<style>
  :root {
    --bg: #0a0a0f; --card: #14141c; --card2:#1b1b27;
    --line: #2a2a3a; --text: #f4f4f8; --muted: #9a9ab0;
    --accent: #a855f7; --accent2:#d946ef; --good:#34d399; --warn:#fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 70% -10%, #2a1240 0%, var(--bg) 55%);
    color: var(--text); font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; padding: 32px 20px 64px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  h1 { font-size: 30px; font-weight: 800; letter-spacing: -.02em; }
  h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { color: var(--muted); margin-top: 6px; }
  .meta { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0 8px; }
  .pill { background: var(--card); border: 1px solid var(--line); border-radius: 999px;
          padding: 6px 14px; font-size: 13px; color: var(--muted); }
  .pill b { color: var(--text); }
  .bar { display:flex; gap:10px; flex-wrap:wrap; margin: 14px 0 26px; }
  .btn { display:inline-flex; align-items:center; gap:8px; text-decoration:none;
         background: linear-gradient(90deg, var(--accent), var(--accent2));
         color:#fff; font-weight:600; padding:10px 18px; border-radius:10px;
         box-shadow: 0 6px 20px rgba(168,85,247,.3); }
  .btn.ghost { background: var(--card); border:1px solid var(--line); color: var(--text); box-shadow:none; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px,1fr)); gap: 16px; }
  .card { background: linear-gradient(180deg, var(--card), var(--card2));
          border: 1px solid var(--line); border-radius: 16px; padding: 18px;
          position: relative; overflow: hidden; transition: transform .15s, border-color .15s; }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .rank { position:absolute; top:14px; right:16px; font-size:12px; color:var(--muted); }
  .score { font-size: 34px; font-weight: 800; line-height: 1;
           background: linear-gradient(90deg, var(--accent), var(--accent2));
           -webkit-background-clip:text; background-clip:text; color:transparent; }
  .score small { display:block; font-size:11px; color:var(--muted); font-weight:600;
                 letter-spacing:.08em; text-transform:uppercase; -webkit-text-fill-color:var(--muted); }
  .name { font-size: 18px; font-weight: 700; margin: 12px 0 2px; }
  .tags { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .row { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-top:1px solid var(--line); }
  .row span:first-child { color: var(--muted); }
  .conf { color: var(--good); font-weight:600; }
  .tier { display:inline-block; margin-top:12px; font-size:12px; font-weight:700;
          color:#fff; background:rgba(168,85,247,.18); border:1px solid var(--accent);
          padding:4px 10px; border-radius:999px; }
  .links { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .links a { font-size:12px; text-decoration:none; color:var(--accent);
             border:1px solid var(--line); padding:6px 10px; border-radius:8px; }
  .links a:hover { border-color: var(--accent); }
  .empty { color: var(--muted); text-align:center; padding:60px 0; }
  footer { color: var(--muted); font-size:12px; margin-top:36px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Lead <span>Finder</span></h1>
    <div class="sub">US local businesses with no website — ranked by buy-readiness.</div>
    <div class="meta" id="meta"></div>
    <div class="bar">
      <a class="btn" id="icsBtn" href="leads.ics">📅 Subscribe in Apple Calendar</a>
      <a class="btn ghost" href="leads.json">leads.json</a>
    </div>
  </header>
  <div class="grid" id="grid"></div>
  <footer>Auto-generated daily via GitHub Actions · arjunganesh.com</footer>
</div>

<script>
const esc = s => (s ?? "").toString().replace(/[&<>"]/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function card(l, i) {
  const socials = Object.entries(l.socials || {})
    .map(([k, v]) => `<a href="${esc(v)}" target="_blank" rel="noopener">${esc(k)}</a>`).join("");
  const phone = l.phone ? `<a href="tel:${esc(l.phone.replace(/[^0-9]/g,''))}">${esc(l.phone)}</a>` : "—";
  return `<div class="card">
    <div class="rank">#${i + 1}</div>
    <div class="score">${esc(l.overall_score)}<small>Lead score</small></div>
    <div class="name">${esc(l.business_name)}</div>
    <div class="tags">${esc(l.niche)} · ${esc(l.city)}</div>
    <div class="row"><span>No-website confidence</span><span class="conf">${esc(l.no_website_confidence)}%</span></div>
    <div class="row"><span>Buyer signal</span><span>${esc(l.buyer_signal_score)}/100</span></div>
    <div class="row"><span>Phone</span><span>${phone}</span></div>
    <div class="row"><span>Affordability</span><span>${esc(l.affordability)}</span></div>
    <div class="tier">${esc(l.suggested_tier)} · ${esc(l.suggested_price)}</div>
    <div class="links">
      ${l.prompt_file ? `<a href="${esc(l.prompt_file)}" target="_blank">📄 Website prompt</a>` : ""}
      ${socials}
    </div>
  </div>`;
}

fetch("leads.json?_=" + Date.now()).then(r => r.json()).then(d => {
  const g = document.getElementById("grid"), m = document.getElementById("meta");
  const when = d.generated ? new Date(d.generated).toLocaleString() : "—";
  m.innerHTML =
    `<span class="pill">Last run: <b>${esc(when)}</b></span>` +
    `<span class="pill">Leads: <b>${esc(d.count)}</b></span>` +
    `<span class="pill">Searches this month: <b>${esc(d.queries_used_this_month)}/${esc(d.query_budget)}</b></span>`;
  const leads = d.leads || [];
  g.innerHTML = leads.length ? leads.map(card).join("")
    : `<div class="empty">No leads yet — the first daily run will populate this.</div>`;
}).catch(() => {
  document.getElementById("grid").innerHTML =
    `<div class="empty">No data yet. Run the workflow once (Actions → Daily Lead Finder → Run workflow).</div>`;
});

// Use the webcal:// scheme so iPhone opens the Calendar subscription dialog.
const ics = document.getElementById("icsBtn");
ics.href = location.href.replace(/^https?:/, "webcal:").replace(/index\.html$/, "") + "leads.ics";
</script>
</body>
</html>
