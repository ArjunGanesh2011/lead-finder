<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lead Finder — Arjun Ganesh</title>
<style>
  :root {
    --bg: #0a0a0f; --card: #14141c; --card2:#1b1b27;
    --line: #2a2a3a; --text: #f4f4f8; --muted: #9a9ab0;
    --accent: #a855f7; --accent2:#d946ef; --good:#34d399; --warn:#fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 70% -10%, #2a1240 0%, var(--bg) 55%);
    color: var(--text); font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; padding: 32px 20px 64px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  h1 { font-size: 30px; font-weight: 800; letter-spacing: -.02em; }
  h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { color: var(--muted); margin-top: 6px; }
  .meta { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0 8px; }
  .pill { background: var(--card); border: 1px solid var(--line); border-radius: 999px;
          padding: 6px 14px; font-size: 13px; color: var(--muted); }
  .pill b { color: var(--text); }
  .bar { display:flex; gap:10px; flex-wrap:wrap; margin: 14px 0 26px; }
  .btn { display:inline-flex; align-items:center; gap:8px; text-decoration:none;
         background: linear-gradient(90deg, var(--accent), var(--accent2));
         color:#fff; font-weight:600; padding:10px 18px; border-radius:10px;
         box-shadow: 0 6px 20px rgba(168,85,247,.3); }
  .btn.ghost { background: var(--card); border:1px solid var(--line); color: var(--text); box-shadow:none; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px,1fr)); gap: 16px; }
  .card { background: linear-gradient(180deg, var(--card), var(--card2));
          border: 1px solid var(--line); border-radius: 16px; padding: 18px;
          position: relative; overflow: hidden; transition: transform .15s, border-color .15s; }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .rank { position:absolute; top:14px; right:16px; font-size:12px; color:var(--muted); }
  .score { font-size: 34px; font-weight: 800; line-height: 1;
           background: linear-gradient(90deg, var(--accent), var(--accent2));
           -webkit-background-clip:text; background-clip:text; color:transparent; }
  .score small { display:block; font-size:11px; color:var(--muted); font-weight:600;
                 letter-spacing:.08em; text-transform:uppercase; -webkit-text-fill-color:var(--muted); }
  .name { font-size: 18px; font-weight: 700; margin: 12px 0 2px; }
  .tags { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .row { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-top:1px solid var(--line); }
  .row span:first-child { color: var(--muted); }
  .row .addr { text-align: right; max-width: 62%; color: var(--text); }
  .conf { color: var(--good); font-weight:600; }
  .tier { display:inline-block; margin-top:12px; font-size:12px; font-weight:700;
          color:#fff; background:rgba(168,85,247,.18); border:1px solid var(--accent);
          padding:4px 10px; border-radius:999px; }
  .tier.starter { background:rgba(52,211,153,.16); border-color:var(--good); }
  .tier.growth  { background:rgba(168,85,247,.18); border-color:var(--accent); }
  .tier.premium { background:rgba(251,191,36,.16); border-color:var(--warn); }
  .links { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .links a { font-size:12px; text-decoration:none; color:var(--accent);
             border:1px solid var(--line); padding:6px 10px; border-radius:8px; }
  .links a:hover { border-color: var(--accent); }
  .links a.ig { color:#fff; border:none; font-weight:600;
                background:linear-gradient(90deg,#f58529,#dd2a7b,#8134af); }
  .empty { color: var(--muted); text-align:center; padding:60px 0; }
  button.btn { font: inherit; cursor: pointer; }
  .datebadge { position:absolute; top:14px; right:16px; font-size:11px; color:var(--muted); }
  .newtag { display:inline-block; font-size:10px; font-weight:800; letter-spacing:.05em;
            color:#06281b; background:var(--good); border-radius:5px; padding:1px 6px;
            margin-left:8px; vertical-align:middle; }
  .card.contacted { opacity:.4; }
  .card.contacted .name { text-decoration: line-through; }
  .contactbar { margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }
  .contactbar label { font-size:13px; color:var(--muted); cursor:pointer;
                      display:flex; align-items:center; gap:9px; user-select:none; }
  .contactbar input { width:18px; height:18px; accent-color:var(--accent); cursor:pointer; }
  footer { color: var(--muted); font-size:12px; margin-top:36px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Lead <span>Finder</span></h1>
    <div class="sub">US local businesses with no website — ranked by buy-readiness.</div>
    <div class="meta" id="meta"></div>
    <div class="bar">
      <a class="btn" id="icsBtn" href="leads.ics">📅 Subscribe in Apple Calendar</a>
      <button class="btn ghost" id="hideBtn">Hide contacted</button>
      <a class="btn ghost" href="leads.json">leads.json</a>
    </div>
  </header>
  <div class="grid" id="grid"></div>
  <footer>Auto-generated daily via GitHub Actions · arjunganesh.com</footer>
</div>

<script>
const esc = s => (s ?? "").toString().replace(/[&<>"]/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const CK = "lf_contacted";
const loadContacted = () => {
  try { return new Set(JSON.parse(localStorage.getItem(CK) || "[]")); }
  catch { return new Set(); }
};
const saveContacted = set => localStorage.setItem(CK, JSON.stringify([...set]));
const fmtDate = s => {
  const d = new Date(s + "T00:00");
  return isNaN(d) ? s : d.toLocaleDateString(undefined, {month:"short", day:"numeric"});
};

function card(l, contacted, today) {
  const socialOrder = ["instagram","facebook","yelp","twitter","linkedin","youtube","tiktok"];
  const sortedSocials = Object.entries(l.socials || {}).sort(([a],[b]) => {
    const ai = socialOrder.indexOf(a), bi = socialOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  const ig = (l.socials || {}).instagram;
  const igBadge = ig ? `<a class="ig" href="${esc(ig)}" target="_blank" rel="noopener">📸 Instagram</a>` : "";
  const otherSocials = sortedSocials.filter(([k]) => k !== "instagram")
    .map(([k, v]) => `<a href="${esc(v)}" target="_blank" rel="noopener">${esc(k)}</a>`).join("");
  const phone = l.phone ? `<a href="tel:${esc(l.phone.replace(/[^0-9+]/g,''))}">${esc(l.phone)}</a>` : "—";
  const ratingTxt = l.rating ? ` · ★${esc(l.rating)} (${esc(l.review_count || 0)})` : "";
  const mapsLink = l.maps_url ? `<a href="${esc(l.maps_url)}" target="_blank" rel="noopener">📍 Maps</a>` : "";
  const addr = l.address
    ? `<div class="row"><span>Address</span><span class="addr">${esc(l.address)}</span></div>` : "";
  const dateBadge = l.added ? `<div class="datebadge">${esc(fmtDate(l.added))}</div>` : "";
  const newTag = l.added === today ? `<span class="newtag">NEW</span>` : "";
  const done = contacted.has(l.slug);
  return `<div class="card ${done ? "contacted" : ""}">
    ${dateBadge}
    <div class="score">${esc(l.overall_score)}<small>Lead score</small></div>
    <div class="name">${esc(l.business_name)}${newTag}</div>
    <div class="tags">${esc(l.niche)} · ${esc(l.city)}${ratingTxt}</div>
    <div class="row"><span>No-website confidence</span><span class="conf">${esc(l.no_website_confidence)}%</span></div>
    <div class="row"><span>Buyer signal</span><span>${esc(l.buyer_signal_score)}/100</span></div>
    <div class="row"><span>📞 Phone</span><span>${phone}</span></div>
    ${addr}
    <div class="row"><span>Affordability</span><span>${esc(l.affordability)}</span></div>
    <div class="tier ${esc((l.suggested_tier || '').toLowerCase())}">${esc(l.suggested_tier)} · ${esc(l.suggested_price)}</div>
    <div class="links">
      ${l.prompt_file ? `<a href="${esc(l.prompt_file)}" target="_blank">📄 Website prompt</a>` : ""}
      ${mapsLink}${igBadge}${otherSocials}
    </div>
    <div class="contactbar"><label><input type="checkbox" class="chk" data-slug="${esc(l.slug)}" ${done ? "checked" : ""}> Contacted — hide from active list</label></div>
  </div>`;
}

let DATA = null, hideContacted = false;

function updateMeta() {
  const contacted = loadContacted();
  const leads = DATA.leads || [];
  const remaining = leads.filter(l => !contacted.has(l.slug)).length;
  const when = DATA.generated ? new Date(DATA.generated).toLocaleString() : "—";
  document.getElementById("meta").innerHTML =
    `<span class="pill">Last run: <b>${esc(when)}</b></span>` +
    `<span class="pill">Not contacted: <b>${remaining}</b> of ${leads.length}</span>` +
    `<span class="pill">Searches this month: <b>${esc(DATA.queries_used_this_month)}/${esc(DATA.query_budget)}</b></span>`;
}

function render() {
  if (!DATA) return;
  const contacted = loadContacted();
  const today = new Date().toISOString().slice(0, 10);
  // Uncontacted first (keep server order: newest on top), contacted sink down.
  const leads = (DATA.leads || []).slice()
    .sort((a, b) => (contacted.has(a.slug) ? 1 : 0) - (contacted.has(b.slug) ? 1 : 0));
  const shown = hideContacted ? leads.filter(l => !contacted.has(l.slug)) : leads;
  const g = document.getElementById("grid");
  g.innerHTML = shown.length ? shown.map(l => card(l, contacted, today)).join("")
    : `<div class="empty">Nothing to show — all leads contacted. New ones arrive at 10 AM.</div>`;
  g.querySelectorAll(".chk").forEach(cb => cb.addEventListener("change", () => {
    const c = loadContacted();
    cb.checked ? c.add(cb.dataset.slug) : c.delete(cb.dataset.slug);
    saveContacted(c);
    render();
  }));
  updateMeta();
}

document.getElementById("hideBtn").addEventListener("click", () => {
  hideContacted = !hideContacted;
  document.getElementById("hideBtn").textContent = hideContacted ? "Show all" : "Hide contacted";
  render();
});

fetch("leads.json?_=" + Date.now()).then(r => r.json()).then(d => {
  DATA = d; render();
}).catch(() => {
  document.getElementById("grid").innerHTML =
    `<div class="empty">No data yet. Run the workflow once (Actions → Daily Lead Finder → Run workflow).</div>`;
});

// Use the webcal:// scheme so iPhone opens the Calendar subscription dialog.
const ics = document.getElementById("icsBtn");
ics.href = location.href.replace(/^https?:/, "webcal:").replace(/index\.html$/, "") + "leads.ics";
</script>
</body>
</html>
