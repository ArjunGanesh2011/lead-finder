name: Daily Lead Finder

on:
  schedule:
    # 15:00 UTC daily = 10:00 AM US Central (your timezone). Adjust if needed.
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: lead-finder
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Find leads
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: python src/run_all.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: daily leads update [skip ci]"
          git push
